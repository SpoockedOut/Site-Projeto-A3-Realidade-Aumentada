<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            justify-content: center;
            align-items: center;
            background-color: #965417;
            text-align:center;
            place-items: center;
        }
        model-viewer {
            width: 500px;
            height: 500px;
            --poster-color: transparent;
            background-color: #ffffff;
        }
        #ar-button {
            background-color: #ffffff;
            border-radius: 4px;
            border: none;
            position: absolute;
            bottom: 16px;
            right: 16px;
            padding: 12px 24px;
            font-family: sans-serif;
            font-weight: bold;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.15);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Olá</h1><br><br><br>
    <h3>Compre Mesa</h3>
   <model-viewer        
        src="Modelos/ModeloMesaCadeirante.glb" 
        alt="Modelo 3D da Mesa"
        ar
        camera-controls
        touch-action="pan-y"
        shadow-intensity="1">
    </model-viewer>
    <br>
    <h3>Compre Gabinete</h3>
    <model-viewer        
        src="Modelos/ModeloGabineteCadeirante.glb" 
        alt="Modelo 3D do Gabinete"
        ar
        camera-controls
        touch-action="pan-y"
        shadow-intensity="1">
    </model-viewer>
    <br>
    <h3>Compre Balcão de Cozinha</h3>
</body>
</html>
