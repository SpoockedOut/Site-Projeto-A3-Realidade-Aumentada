<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            justify-content: center;
            align-items: center;
            background-color: #965417;
            text-align:center;
            place-items: center;
        }
        model-viewer {
            width: 500px;
            height: 500px;
            --poster-color: transparent;
            background-color: #ffffff;
        }
        #ar-button {
            width: 120px;
            height: 60px;
            background-color: #03b4a6;
            color:black;
            border: none;
            position: absolute;
            bottom: 35px;
            right: 35px;
            font-family: sans-serif;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <h1>Olá</h1><br><br><br>
    <h3>Compre Mesa</h3>
   <model-viewer        
        src="Modelos/ModeloMesaCadeirante.glb" 
        alt="Modelo 3D da Mesa"
        camera-controls
        touch-action="pan-y"
        shadow-intensity="1"
        ar>
        <button id="ar-button" slot="ar-button">Começar AR</button>
    </model-viewer>
    <br>
    <h3>Compre Gabinete</h3>
    <model-viewer        
        src="Modelos/ModeloGabineteCadeirante.glb" 
        alt="Modelo 3D do Gabinete"
        camera-controls
        touch-action="pan-y"
        shadow-intensity="1"
        ar>
        <button id="ar-button" slot="ar-button">Começar AR</button>
    </model-viewer>
    <br>
    <h3>Compre Balcão de Cozinha</h3>
</body>
</html>
