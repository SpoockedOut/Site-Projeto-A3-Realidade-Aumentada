    <div class="bar"><a href="index.html"><button class="bar-button">Início</button></a></div>
    <h1>Gabinete</h1><br><br><br>
    <h4>Gabinete de madeira maciça com 3 gavetas. Possui 68,2 cm de comprimento, 43,6 cm de largura e 112,8 cm de altura. <br>Recomendação de Limpeza: Limpar com pano seco para retirar o pó. Não aplicar produtos abrasivos.</h4>
    <div class="wrapper-ar">
        <model-viewer        
            src="Modelos/ModeloGabineteCadeirante.glb" 
            alt="Modelo 3D do Gabinete"
            camera-controls
            touch-action="pan-y"
            shadow-intensity="1"
            ar>
            <button id="ar-button" slot="ar-button">Começar AR</button>
        </model-viewer>
    </div>
